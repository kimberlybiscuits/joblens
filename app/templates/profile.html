{% extends "base.html" %}                                                                                                                            
                                                                                                                                                    
{% block content %}                                                                                                                                  
<div class="max-w-2xl mx-auto">                                                                                                                      
    <h1 class="text-2xl font-semibold text-gray-800 mb-6">Your Profile</h1>
                                                                                                                                                    
    <form method="POST" action="/profile" class="space-y-4">                                                                                         

        <div>
            <label class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" name="name" value="{{ profile.name if profile else '' }}"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" value="{{ profile.email if profile else '' }}"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Current job title</label>
            <input type="text" name="current_title" value="{{ profile.current_title if profile else '' }}"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Years of experience</label>
            <input type="number" name="years_experience" value="{{ profile.years_experience if profile else 0 }}"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Skills (comma separated)</label>
            <input type="text" name="skills" value="{{ profile.skills if profile else '' }}"
                placeholder="e.g. Python, project management, French"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Education</label>
            <textarea name="education" rows="3"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2"
                placeholder="e.g. MSc International Relations, University of Edinburgh, 2019">{{ profile.education if profile else '' }}</textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Languages</label>
            <input type="text" name="languages" value="{{ profile.languages if profile else '' }}"
                placeholder="e.g. English (native), French (B2)"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Location preference</label>
            <input type="text" name="location_preference" value="{{ profile.location_preference if profile else '' }}"
                placeholder="e.g. Brussels, Remote"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>

        <div class="flex items-center gap-2">
            <input type="checkbox" name="open_to_remote" value="true"
                {{ 'checked' if profile and profile.open_to_remote else '' }}>
            <label class="text-sm font-medium text-gray-700">Open to remote</label>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Bio / Summary</label>
            <textarea name="bio" rows="4"
                class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2"
                placeholder="A short paragraph about yourself">{{ profile.bio if profile else '' }}</textarea>
        </div>

        <button type="submit"
            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
            Save profile
        </button>

    </form>
</div>
{% endblock %}
