<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,
initial-scale=1.0">
<title>JobLens</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">JobLens</h1>
        <div class="flex gap-6">
            <a href="/jobs" class="text-blue-600 hover:underline">Jobs</a>
            <a href="/saved" class="text-blue-600 hover:underline">My Jobs</a>
            <a href="/profile" class="text-blue-600 hover:underline">Profile</a>
        </div>
    </div>
</nav>
<main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}
    <p class="text-gray-600">Welcome to JobLens. Your job search
starts here.</p>
    {% endblock %}
</main>
</body>
</html>
